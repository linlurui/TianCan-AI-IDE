version: '3'
name: tiancan-ai-ide
outputfilename: tiancan-ai-ide

info:
  companyName: "Rocky"
  productName: "TianCan AI IDE"
  productIdentifier: "com.rocky.tiancan-ai-ide"
  description: "纯本地 AI 编程 IDE"
  copyright: "(c) 2025, Rocky"
  version: "0.1.0"

frontend:
  dir: frontend
  devServerURL: http://localhost:34115
  installCommand: npm install
  buildCommand: npm run build
  devCommand: npm run dev

author:
  name: Rocky
  email: ""

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - build
    file:
      - .DS_Store
    watched_extension:
      - "*.go"
    git_ignore: true
  executes:
    - cmd: cd frontend && npm install
      type: once
    - cmd: cd frontend && npm run dev
      type: background
    - cmd: go mod tidy
      type: blocking
    - cmd: go build -o build/tiancan-ai-ide
      type: blocking
    - cmd: ./run-dev.sh
      type: primary
